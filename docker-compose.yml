version: "3.9"

services:
  krish-bank:
    build: .
    container_name: krish-bank-server
    ports:
      - "8080:8080"
    volumes:
      # Persists bank_data.json outside the container
      - bank_data:/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  bank_data:
    driver: local